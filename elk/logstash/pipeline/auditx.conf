input {
  beats {
    port => 5044
  }
}

filter {
  # The Spring services emit JSON via logstash-logback-encoder.
  # Filebeat already decoded the outer Docker log wrapper; the inner
  # "message" field is the raw JSON string from the app.
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "app"
      skip_on_invalid_json => true
    }

    # Promote key AUDITX fields to top-level for easy Kibana filtering
    if [app][level]     { mutate { copy => { "[app][level]"     => "level"     } } }
    if [app][service]   { mutate { copy => { "[app][service]"   => "service"   } } }
    if [app][traceId]   { mutate { copy => { "[app][traceId]"   => "traceId"   } } }
    if [app][tenantId]  { mutate { copy => { "[app][tenantId]"  => "tenantId"  } } }
    if [app][userId]    { mutate { copy => { "[app][userId]"    => "userId"    } } }
    if [app][eventId]   { mutate { copy => { "[app][eventId]"   => "eventId"   } } }
    if [app][message]   { mutate { copy => { "[app][message]"   => "log_message" } } }
    if [app][timestamp] { mutate { copy => { "[app][timestamp]" => "app_timestamp" } } }
  }

  # Tag the source container name as the service if not already set
  if ![service] and [container][name] {
    mutate { copy => { "[container][name]" => "service" } }
  }

  # Parse app_timestamp as the canonical @timestamp if present
  if [app_timestamp] {
    date {
      match => ["app_timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "auditx-logs-%{+YYYY.MM.dd}"
    # Create a separate index per service for easier filtering
    # index => "auditx-%{[service]}-%{+YYYY.MM.dd}"
  }

  # Uncomment to debug pipeline locally
  # stdout { codec => rubydebug }
}
