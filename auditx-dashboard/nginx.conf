server {
    listen 3000;
    client_max_body_size 50m;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy dashboard + report APIs → report service
    location /api/ {
        proxy_pass http://auditx-report:8086;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # Proxy ingestion → ingestion service
    location /ingest/ {
        rewrite ^/ingest/(.*)$ /$1 break;
        proxy_pass http://auditx-ingestion:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, X-API-Key";
    }

    # Proxy live stream SSE → live-stream service
    # proxy_buffering MUST be off for SSE — nginx buffers break the event stream
    location /stream/ {
        proxy_pass http://auditx-live-stream:8089;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        add_header X-Accel-Buffering no;
    }

    # Proxy PII detector API
    location /pii/ {
        rewrite ^/pii/(.*)$ /$1 break;
        proxy_pass http://auditx-pii-detector:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # Proxy enrichment API
    location /enrichment/ {
        rewrite ^/enrichment/(.*)$ /$1 break;
        proxy_pass http://auditx-enrichment:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # Proxy notification API
    location /notify/ {
        rewrite ^/notify/(.*)$ /$1 break;
        proxy_pass http://auditx-notification:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # Proxy webhook receiver
    location /webhook/ {
        rewrite ^/webhook/(.*)$ /webhook/$1 break;
        proxy_pass http://auditx-ingestion:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $http_x_api_key;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, X-API-Key";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
