spring:
  application:
    name: auditx-enrichment
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/auditx}
      auto-index-creation: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${ENRICHMENT_PORT:8091}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always

enrichment:
  geo-ip-url: ${GEO_IP_URL:http://ip-api.com/json}
  skip-private-ips: true
