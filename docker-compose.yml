services:
  # ─── Infrastructure ───────────────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: auditx-mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: auditx
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: auditx-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: auditx-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: auditx-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── AUDITX Services ──────────────────────────────────────────────────────

  auditx-gateway:
    build:
      context: .
      dockerfile: auditx-gateway/Dockerfile
    container_name: auditx-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INGESTION_SERVICE_URI: http://auditx-ingestion:8081
      LLM_SERVICE_URI: http://auditx-llm:8084
      REPORT_SERVICE_URI: http://auditx-report:8086
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-classpath:keys/public.pem}
      RATE_LIMIT_REPLENISH: ${RATE_LIMIT_REPLENISH:-10}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-20}
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-gateway
    restart: unless-stopped

  auditx-ingestion:
    build:
      context: .
      dockerfile: auditx-ingestion/Dockerfile
    container_name: auditx-ingestion
    ports:
      - "${INGESTION_PORT:-8081}:8081"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      MONGODB_URI: mongodb://mongodb:27017/auditx
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INGESTION_PORT: 8081
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-ingestion
    restart: unless-stopped

  auditx-parser:
    build:
      context: .
      dockerfile: auditx-parser/Dockerfile
    container_name: auditx-parser
    ports:
      - "${PARSER_PORT:-8082}:8082"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      MONGODB_URI: mongodb://mongodb:27017/auditx
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PARSER_PORT: 8082
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-parser
    restart: unless-stopped

  auditx-risk-engine:
    build:
      context: .
      dockerfile: auditx-risk-engine/Dockerfile
    container_name: auditx-risk-engine
    ports:
      - "${RISK_ENGINE_PORT:-8083}:8083"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      MONGODB_URI: mongodb://mongodb:27017/auditx
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RISK_ENGINE_PORT: 8083
      FAILED_LOGIN_WINDOW_MINUTES: ${FAILED_LOGIN_WINDOW_MINUTES:-60}
      FAILED_LOGIN_THRESHOLD: ${FAILED_LOGIN_THRESHOLD:-5}
      GEO_ANOMALY_LOOKBACK_DAYS: ${GEO_ANOMALY_LOOKBACK_DAYS:-30}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-risk-engine
    restart: unless-stopped

  auditx-llm:
    build:
      context: .
      dockerfile: auditx-llm/Dockerfile
    container_name: auditx-llm
    ports:
      - "${LLM_PORT:-8084}:8084"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      MONGODB_URI: mongodb://mongodb:27017/auditx
      LLM_PORT: 8084
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-placeholder}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
    depends_on:
      mongodb:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-llm
    restart: unless-stopped

  auditx-alert:
    build:
      context: .
      dockerfile: auditx-alert/Dockerfile
    container_name: auditx-alert
    ports:
      - "${ALERT_PORT:-8085}:8085"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      MONGODB_URI: mongodb://mongodb:27017/auditx
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ALERT_PORT: 8085
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-alert
    restart: unless-stopped

  auditx-report:
    build:
      context: .
      dockerfile: auditx-report/Dockerfile
    container_name: auditx-report
    ports:
      - "${REPORT_PORT:-8086}:8086"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      MONGODB_URI: mongodb://mongodb:27017/auditx
      REPORT_PORT: 8086
    depends_on:
      mongodb:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-report
    restart: unless-stopped

  auditx-policy-engine:
    build:
      context: .
      dockerfile: auditx-policy-engine/Dockerfile
    container_name: auditx-policy-engine
    ports:
      - "${POLICY_ENGINE_PORT:-8087}:8087"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      MONGODB_URI: mongodb://mongodb:27017/auditx
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POLICY_ENGINE_PORT: 8087
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-policy-engine
    restart: unless-stopped

  auditx-compliance:
    build:
      context: .
      dockerfile: auditx-compliance/Dockerfile
    container_name: auditx-compliance
    ports:
      - "${COMPLIANCE_PORT:-8088}:8088"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      MONGODB_URI: mongodb://mongodb:27017/auditx
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      COMPLIANCE_PORT: 8088
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-compliance
    restart: unless-stopped

  auditx-live-stream:
    build:
      context: .
      dockerfile: auditx-live-stream/Dockerfile
    container_name: auditx-live-stream
    ports:
      - "${LIVE_STREAM_PORT:-8089}:8089"
    environment:
      SPRING_PROFILES_ACTIVE: onprem
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      LIVE_STREAM_PORT: 8089
    depends_on:
      kafka:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        labels: "service"
    labels:
      service: auditx-live-stream
    restart: unless-stopped

  # ─── Dashboard UI ────────────────────────────────────────────────────────

  auditx-dashboard:
    build:
      context: ./auditx-dashboard
      dockerfile: Dockerfile
      args:
        REACT_APP_REPORT_URL: http://localhost:8086
        REACT_APP_INGESTION_URL: http://localhost:8081
        REACT_APP_KIBANA_URL: http://localhost:5601
    container_name: auditx-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - auditx-report
      - auditx-ingestion
      - auditx-live-stream
    restart: unless-stopped

  # ─── ELK Stack ───────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: auditx-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: auditx-logstash
    ports:
      - "${LOGSTASH_PORT:-5044}:5044"
      - "9600:9600"
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600/_node/stats | grep -q 'status'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: auditx-kibana
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: auditx-filebeat
    user: root
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    environment:
      - ELASTICSEARCH_HOST=elasticsearch:9200
      - LOGSTASH_HOST=logstash:5044
    depends_on:
      logstash:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
  elasticsearch_data:
  filebeat_data:
